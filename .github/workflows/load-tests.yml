name: Performance Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/load-tests.yml'
      - 'tests/load_tests/**'
      - 'tests/files_for_tests/**'
  workflow_dispatch:
    inputs:
      test-type:
        description: "Which test to run?"
        required: true
        default: 'smoke_test'
        type: choice
        options:
          - 'all'
          - 'smoke_test'
          - 'average_test'

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Django Website
        uses: actions/checkout@v4
        with:
          repository: explrprobe-tech/my_django_news_website
          path: django-website

      - name: Checkout tests
        uses: actions/checkout@v4
        with:
          path: tests

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Django dependencies
        run: |
          cd django-website/mysite
          pip install -r requirements.txt
          pip install gunicorn

      - name: Start Django with Gunicorn
        run: |
          cd django-website/mysite
          gunicorn --workers 4 --bind 0.0.0.0:8000 mysite.wsgi:application &

      - name: Wait for Django
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/ > /dev/null; then
              echo "✅ Django is ready for load tests!"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Create unified deploy directory
        run: mkdir -p combined-results

      # ----------------------------------------------------
      # БЛОК SMOKE TEST
      # ----------------------------------------------------
      - name: Run k6 smoke test
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.test-type == 'all' || github.event.inputs.test-type == 'smoke_test'
        run: |
          cd tests/tests
          mkdir -p k6-smoke-results
          K6_WEB_DASHBOARD=true K6_WEB_DASHBOARD_EXPORT=${{ github.workspace }}/tests/tests/k6-smoke-results/index.html k6 run load_tests/smoke_test.js
          # Copy results to combined directory
          mkdir -p ${{ github.workspace }}/combined-results/k6-smoke
          cp -r k6-smoke-results/* ${{ github.workspace }}/combined-results/k6-smoke/ 2>/dev/null || echo "No files to copy"
        env:
          BASE_URL: http://localhost:8000

      # ----------------------------------------------------
      # БЛОК AVERAGE TEST
      # ----------------------------------------------------
      - name: Run k6 average test
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.test-type == 'all' || github.event.inputs.test-type == 'average_test'
        run: |
          cd tests/tests
          mkdir -p k6-average-results
          K6_WEB_DASHBOARD=true K6_WEB_DASHBOARD_EXPORT=${{ github.workspace }}/tests/tests/k6-average-results/index.html k6 run load_tests/average_test.js
          # Copy results to combined directory
          mkdir -p ${{ github.workspace }}/combined-results/k6-average
          cp -r k6-average-results/* ${{ github.workspace }}/combined-results/k6-average/ 2>/dev/null || echo "No files to copy"
        env:
          BASE_URL: http://localhost:8000

      - name: 🔍 Debug - Check results
        run: |
          echo "📁 Current directory: $(pwd)"
          echo "📁 tests/tests folder:"
          ls -la tests/tests/ || echo "Folder not found!"
          echo "📁 k6-smoke-results:"
          ls -la tests/tests/k6-smoke-results/ || echo "Folder not found!"
          echo "📁 k6-average-results:"
          ls -la tests/tests/k6-average-results/ || echo "Folder not found!"
          echo "📁 combined-results:"
          ls -la combined-results/ || echo "Folder not found!"

      - name: Deploy all results to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./combined-results 
          keep_files: true