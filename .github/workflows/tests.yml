name: Pytest CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    
    steps:
    - name: Checkout Django Website
      uses: actions/checkout@v4
      with:
        repository: explrprobe-tech/my_django_news_website
        path: django-website

    - name: Checkout tests
      uses: actions/checkout@v4
      with:
        path: tests
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Django Website dependecies
      run: |
        cd django-website/mysite
        pip install -r requirements.txt

    - name: Validate Django Website
      run: |
        cd django-website/mysite
        python manage.py check

    - name: Check migration Django Website
      run: |
        cd django-website/mysite
        python manage.py makemigrations --check --dry-run

    - name: Run Django Website
      run: |
        cd django-website/mysite
        python manage.py runserver 0.0.0.0:8000 &

    - name: ⏳ Wait for Django to be ready
      run: |
        for i in {1..30}; do
          if curl -s http://127.0.0.1:8000/ > /dev/null; then
            echo "✅ Django is ready!"
            exit 0
          fi
          echo "Waiting for Django... ($i/30)"
          sleep 2
        done
        echo "❌ Django failed to start"
        exit 1

    - name: Install tests dependencies
      run: |
        cd tests
        pip install -r requirements-test.txt

    - name: 🔽 Install Playwright browsers  # ← ADD THIS STEP!
      run: |
        cd tests
        playwright install chromium

    - name: Run api tests
      run: |
        cd tests/tests
        pytest api/ -v
        
    - name: Run ui tests
      run: |
        cd tests/tests
        pytest ui/ -v
