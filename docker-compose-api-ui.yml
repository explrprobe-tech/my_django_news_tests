version: '3.9'

services:
  api-test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: pytest tests/api/ -v --cov=.
    depends_on:
      - app-under-test
    environment:
      BASE_URL: http://app-under-test:8000/
    volumes:
      - ./tests:/app/tests
      - ./reports:/app/reports
    networks:
      - test-network

  ui-test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: pytest tests/ui/ -v --cov=.
    depends_on:
      - app-under-test
    environment:
      BASE_URL: http://app-under-test:8000/
    volumes:
      - ./tests:/app/tests
      - ./reports:/app/reports
    networks:
      - test-network

  app-under-test:
    image: mysite-web
    ports:
      - "8000:8000"
    volumes:
      - ../my_django_news_website/mysite:/app 
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=mysite.settings
      - ALLOWED_HOSTS=app-under-test,localhost,127.0.0.1 
      - DEBUG=True
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - test-network

networks:
  test-network:
    driver: bridge